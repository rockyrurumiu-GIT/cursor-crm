{% extends "base.html" %}
{% set is_edit = client_id is defined %}
{% block title %}{{ "修改客户" if is_edit else "新增客户" }} · ITO CRM V8{% endblock %}
{% block content %}
<div class="container mx-auto p-6 max-w-xl">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">{{ "修改客户" if is_edit else "新增客户" }}</h1>
    <form id="new-client-form" class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1">客户名称</label>
            <input name="name" required class="w-full p-2 border rounded">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">行业</label>
            <input name="industry" required class="w-full p-2 border rounded">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">销售负责人</label>
            <input name="owner" required class="w-full p-2 border rounded">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">外包规模</label>
            <input name="scale" required class="w-full p-2 border rounded" placeholder="例如：10人月">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">开拓阶段</label>
            <select name="phase" class="w-full p-2 border rounded">
                <option>初步接触</option>
                <option>方案/报价</option>
                <option>合同签订</option>
                <option>成交</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">描述</label>
            <textarea name="description" required rows="3" class="w-full p-2 border rounded"></textarea>
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">备注</label>
            <textarea name="remarks" rows="3" class="w-full p-2 border rounded" placeholder="可选"></textarea>
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">{{ "保存修改" if is_edit else "保存" }}</button>
            <a href="/customers" class="px-6 py-2 border rounded hover:bg-gray-50">取消</a>
        </div>
        <p id="form-msg" class="text-sm text-red-600 hidden"></p>
    </form>
</div>
{% endblock %}
{% block page_scripts %}
<script>
(function () {
    var form = document.getElementById('new-client-form');
    var msg = document.getElementById('form-msg');
    var clientId = {% if is_edit %}{{ client_id }}{% else %}null{% endif %};
    var submitBtn = form.querySelector('button[type="submit"]');

    async function loadClient() {
        if (!clientId) return;
        msg.classList.add('hidden');
        try {
            var r = await fetch('/api/clients/' + clientId, { headers: window.crmAuthHeader() });
            if (!r.ok) {
                var t = await r.text();
                msg.textContent = '加载失败: ' + t;
                msg.classList.remove('hidden');
                return;
            }
            var data = await r.json();
            ['name', 'industry', 'owner', 'scale', 'phase', 'description', 'remarks'].forEach(function (key) {
                if (form.elements[key]) form.elements[key].value = data[key] || '';
            });
        } catch (err) {
            msg.textContent = '加载失败';
            msg.classList.remove('hidden');
        }
    }

    form.onsubmit = async function (e) {
        e.preventDefault();
        msg.classList.add('hidden');
        var fd = new FormData(form);
        var h = window.crmAuthHeader();
        var url = clientId ? ('/api/clients/' + clientId) : '/api/clients';
        var method = clientId ? 'PUT' : 'POST';
        if (submitBtn) submitBtn.disabled = true;
        try {
            var r = await fetch(url, { method: method, headers: h, body: fd });
            if (!r.ok) {
                var t = await r.text();
                msg.textContent = '保存失败: ' + t;
                msg.classList.remove('hidden');
                if (submitBtn) submitBtn.disabled = false;
                return;
            }
            window.location.href = '/customers';
        } catch (err) {
            msg.textContent = '网络错误';
            msg.classList.remove('hidden');
            if (submitBtn) submitBtn.disabled = false;
        }
    };

    loadClient();
})();
</script>
{% endblock %}
