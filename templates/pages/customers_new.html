{% extends "base.html" %}
{% set is_edit = client_id is defined %}
{% block title %}{{ "修改客户" if is_edit else "新增客户" }} · ITO CRM{% endblock %}
{% block content %}
<div class="container mx-auto p-6 max-w-xl">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">{{ "修改客户" if is_edit else "新增客户" }}</h1>
    <form id="new-client-form" class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1">客户名称</label>
            <input name="name" required class="w-full p-2 border rounded">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">行业</label>
            <input name="industry" required class="w-full p-2 border rounded">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">销售负责人</label>
            <input name="owner" required class="w-full p-2 border rounded">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">外包规模</label>
            <input name="scale" required class="w-full p-2 border rounded" placeholder="例如：10人月">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">开拓阶段</label>
            <select name="phase" class="crm-form-control">
                <option>初步接触</option>
                <option>方案/报价</option>
                <option>合同签订</option>
                <option>成交</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">预估当年合作金额</label>
            <div class="relative">
                <input id="estimated-annual-amount-display" type="text" readonly tabindex="-1"
                    class="w-full p-2 border rounded pr-14 bg-gray-50 text-gray-700 cursor-default"
                    placeholder="由名下商机自动汇总">
                <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm pointer-events-none">万元</span>
            </div>
            <p class="text-xs text-gray-500 mt-1">= 各商机「预估当年金额 × 赢单率」之和（不含输单商机）</p>
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">联系人姓名</label>
            <input name="contact_name" class="w-full p-2 border rounded">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">联系方式</label>
            <input name="contact_info" class="w-full p-2 border rounded" placeholder="电话、微信等">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">联系人职位</label>
            <input name="contact_title" class="w-full p-2 border rounded">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">联系人关系</label>
            <select name="contact_relationship" class="crm-form-control">
                <option value="">请选择</option>
                <option>普通</option>
                <option>良好</option>
                <option>密切</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">获客渠道</label>
            <select name="contact_acquisition_channel" class="crm-form-control">
                <option value="">请选择</option>
                <option value="个人">个人</option>
                <option value="公司">公司</option>
                <option value="其他">其他</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">联系人+1</label>
            <input name="contact_superior_contact" class="w-full p-2 border rounded" placeholder="联系人的上级">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">联系人说明</label>
            <textarea name="contact_description" rows="3" class="w-full p-2 border rounded" placeholder="联系人的具体情况"></textarea>
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">客户所在城市</label>
            <input name="city" class="w-full p-2 border rounded" placeholder="例如：深圳">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">描述</label>
            <textarea name="description" required rows="3" class="w-full p-2 border rounded"></textarea>
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">备注</label>
            <textarea name="remarks" rows="3" class="w-full p-2 border rounded" placeholder="可选"></textarea>
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">{{ "保存修改" if is_edit else "保存" }}</button>
            <a href="/customers" class="px-6 py-2 border rounded hover:bg-gray-50">取消</a>
        </div>
        <p id="form-msg" class="text-sm text-red-600 hidden"></p>
    </form>
</div>
{% endblock %}
{% block page_scripts %}
<script>
(function () {
    var form = document.getElementById('new-client-form');
    var msg = document.getElementById('form-msg');
    var amountDisplay = document.getElementById('estimated-annual-amount-display');
    var clientId = {% if is_edit %}{{ client_id }}{% else %}null{% endif %};
    var submitBtn = form.querySelector('button[type="submit"]');

    function setEstimatedAmountDisplay(value) {
        if (!amountDisplay) return;
        var v = (value || '').trim();
        var digits = v.replace(/[^\d.-]/g, '');
        if (digits) {
            var n = Number(digits);
            amountDisplay.value = Number.isFinite(n) ? n.toLocaleString('zh-CN') : v;
        } else {
            amountDisplay.value = '';
        }
        amountDisplay.placeholder = clientId ? '暂无商机数据' : '保存后由名下商机自动汇总';
    }

    async function loadClient() {
        if (!clientId) {
            setEstimatedAmountDisplay('');
            return;
        }
        msg.classList.add('hidden');
        try {
            var r = await fetch('/api/clients/' + clientId, { headers: window.crmAuthHeader() });
            if (!r.ok) {
                var t = await r.text();
                msg.textContent = '加载失败: ' + t;
                msg.classList.remove('hidden');
                return;
            }
            var data = await r.json();
            ['name', 'industry', 'owner', 'scale', 'phase',
             'contact_name', 'contact_info', 'contact_title', 'contact_relationship',
             'contact_acquisition_channel', 'contact_superior_contact', 'contact_description',
             'city', 'description', 'remarks'].forEach(function (key) {
                if (form.elements[key]) form.elements[key].value = data[key] || '';
            });
            setEstimatedAmountDisplay(data.estimated_annual_amount);
        } catch (err) {
            msg.textContent = '加载失败';
            msg.classList.remove('hidden');
        }
    }

    form.onsubmit = async function (e) {
        e.preventDefault();
        msg.classList.add('hidden');
        var fd = new FormData(form);
        var h = window.crmAuthHeader();
        var url = clientId ? ('/api/clients/' + clientId) : '/api/clients';
        var method = clientId ? 'PUT' : 'POST';
        if (submitBtn) submitBtn.disabled = true;
        try {
            var r = await fetch(url, { method: method, headers: h, body: fd });
            if (!r.ok) {
                var t = await r.text();
                msg.textContent = '保存失败: ' + t;
                msg.classList.remove('hidden');
                if (submitBtn) submitBtn.disabled = false;
                return;
            }
            window.location.href = '/customers';
        } catch (err) {
            msg.textContent = '网络错误';
            msg.classList.remove('hidden');
            if (submitBtn) submitBtn.disabled = false;
        }
    };

    loadClient();
})();
</script>
{% endblock %}
