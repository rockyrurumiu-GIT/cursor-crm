<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ITO CRM V8{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block head_extra %}{% endblock %}
    <style>
        .funnel-layer:hover { filter: brightness(1.1); cursor: pointer; }
        /* 父级若 overflow 非 visible，下拉会被裁切 — nav 禁止横向 overflow 裁剪 */
        .crm-header-nav-wrap { overflow: visible; min-width: 0; }
        .gh-nav-item { position: relative; }
        .gh-mega {
            position: absolute; left: 0; top: 100%; padding-top: 0.45rem; z-index: 200;
            opacity: 0; visibility: hidden; transform: translateY(-4px); pointer-events: none;
            transition: opacity 0.12s ease, transform 0.12s ease, visibility 0.12s;
        }
        .gh-nav-item:hover .gh-mega,
        .gh-nav-item:focus-within .gh-mega {
            opacity: 1; visibility: visible; transform: translateY(0); pointer-events: auto;
        }
        .gh-mega-panel {
            border-radius: 0.75rem;
            border: 1px solid #d0d7de;
            background: #ffffff;
            color: #1f2328;
            box-shadow: 0 16px 48px rgba(1, 4, 9, 0.18);
            min-width: 36rem;
            max-width: min(90vw, 52rem);
        }
        .gh-mega-col-h {
            font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em;
            color: #656d76; text-transform: uppercase; margin-bottom: 0.65rem;
        }
        .gh-mega-link {
            display: block; padding: 0.35rem 0; font-size: 0.9rem; color: #1f2328;
            border-radius: 0.25rem;
        }
        .gh-mega-link:hover { color: #0969da; }
        .gh-mega-footer {
            margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid #d8dee4;
            background: #f6f8fa; margin-left: -1rem; margin-right: -1rem;
            margin-bottom: -1rem; padding-left: 1rem; padding-right: 1rem;
            padding-bottom: 0.75rem; border-radius: 0 0 0.75rem 0.75rem;
        }
        .nav-trigger {
            display: inline-flex; align-items: center; gap: 0.25rem;
            padding: 0.75rem 0.75rem; font-size: 0.875rem; font-weight: 500;
            color: #e6edf3; border-radius: 0.375rem; background: transparent; border: none;
            cursor: default; white-space: nowrap;
        }
        .nav-trigger:hover { background: rgba(255,255,255,0.06); }
        .gh-nav-item.nav-active > .nav-trigger { color: #fff; background: rgba(255,255,255,0.08); }
        .crm-btn-rollback {
            border-radius: 0.5rem;
            border: 1px solid #fca5a5;
            background: #ef4444;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: #ffffff;
            transition: background-color 0.15s ease;
        }
        .crm-btn-rollback:hover { background: #dc2626; }
        .crm-currency-cell {
            text-align: right;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }
        .crm-percent-cell {
            text-align: right;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }
        .crm-total-row td {
            background: #f8fafc;
            border-top: 1px solid #cbd5e1;
            color: #1e293b;
            font-weight: 500;
        }
        .crm-total-label {
            font-size: 1.125rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #0f172a;
        }
        /* 主内容区：减轻双指横向滑动触发浏览器「返回上一页」 */
        #main-shell main {
            overscroll-behavior-x: contain;
        }
        /* 显式横向滚动容器：底部留白避免水平滚动条遮挡末行；阻断横向 scroll chaining */
        .crm-h-scroll {
            overflow-x: auto;
            overscroll-behavior-x: contain;
            overscroll-behavior-y: auto;
            scrollbar-gutter: stable;
            padding-bottom: 14px;
            box-sizing: border-box;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        /* 通用：表格内容区滚动 + 表头固定 */
        .crm-table-scroll {
            max-height: var(--crm-table-scroll-max-height, calc(100vh - 260px));
            overflow-x: auto;
            overflow-y: auto;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
        }
        /* 默认表头吸顶；有左右冻结列时，非冻结表头必须低于冻结角，否则横向滚动会盖住冻结表头 */
        .crm-table-scroll .crm-table thead th.crm-th {
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .crm-table-scroll .crm-table thead th.crm-th:not(.crm-sticky-right-op):not(.delivery-sticky-left-serial):not(.delivery-sticky-left-key):not(.roster-sticky-left-serial):not(.roster-sticky-left-key):not(.settlement-sticky-serial):not(.settlement-sticky-date):not(.settlement-sticky-customer) {
            z-index: 3;
        }
        /* 通用：操作列固定在最右侧（表头/表体分层） */
        .crm-sticky-right-op {
            position: sticky;
            right: 0;
            background: #fff;
            border-left: 1px solid #e5e7eb;
            box-shadow: -8px 0 16px -10px rgba(15, 23, 42, 0.18);
        }
        .crm-table tbody .crm-sticky-right-op {
            z-index: 8 !important;
        }
        .crm-table thead .crm-sticky-right-op {
            top: 0;
            right: 0;
            z-index: 15 !important;
            background: #e6e2db;
        }
        .crm-table tbody tr:hover .crm-sticky-right-op {
            background: #fafaf9;
        }
        /* 全局表格风格（暖灰表头）。新建表格优先复用这些 class */
        .crm-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        .crm-table th.crm-th {
            padding: 0.75rem 0.95rem;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #2f2a24;
            background: #e6e2db;
            border-bottom: 1px solid #d2cbc1;
            border-right: 1px solid #d8d1c8;
            white-space: nowrap;
            vertical-align: middle;
            text-align: center;
        }
        .crm-table th.crm-th:last-child { border-right: none; }
        .crm-table td.crm-td {
            padding: 0.75rem 0.75rem;
            font-size: 0.875rem;
            color: #374151;
            border-top: 1px solid #f1f5f9;
            vertical-align: top;
            background: #fff;
        }
        .crm-table td.crm-td.crm-name-cell {
            color: #1d4ed8;
            font-weight: 600;
        }
        .crm-table tbody tr:hover td.crm-td { background: #fafaf9; }
        .crm-table tfoot td.crm-td {
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }
        /* 全局表单控件：输入框 / 日期框 / 下拉框统一高度与边框表现 */
        .crm-form-control {
            width: 100%;
            height: 2.5rem;
            min-height: 2.5rem;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            background: #ffffff;
            padding: 0.5rem 0.75rem;
            font-size: 1rem;
            line-height: 1.5rem;
            color: #1f2937;
            box-sizing: border-box;
            vertical-align: middle;
        }
        .crm-form-control--date {
            padding-right: 3.5rem;
        }
        .crm-form-control--error {
            border-width: 2px;
            border-color: #f87171;
        }
        .crm-form-control[readonly] {
            background: #f9fafb;
        }
        select.crm-form-control {
            appearance: none;
        }
        /* 兜底：未迁移到统一类的普通下拉框，也保持与单行文本框同高（筛选用 .crm-filter-control 已由下方 2.25rem 约束） */
        select:not([multiple]):not([size]):not(.crm-form-control):not(.crm-filter-control) {
            min-height: 2.5rem;
            line-height: 1.5rem;
            box-sizing: border-box;
            vertical-align: middle;
        }
        /* 全局筛选条：列表页顶部筛选控件统一高度、边框和按钮风格 */
        .crm-filter-row {
            display: flex;
            flex-wrap: nowrap;
            gap: 0.5rem;
            overflow-x: visible;
            overflow-y: visible;
            padding-bottom: 2px;
        }
        .crm-filter-item {
            flex: 0 0 auto;
        }
        .crm-filter-control {
            height: 2.25rem;
            min-height: 2.25rem;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            background: #ffffff;
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
            line-height: 1.1;
            color: #1f2937;
            box-sizing: border-box;
        }
        .crm-filter-control::placeholder {
            color: #9ca3af;
        }
        select.crm-filter-control {
            appearance: none;
        }
        .crm-filter-reset {
            height: 2.25rem;
            min-height: 2.25rem;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            background: #ffffff;
            padding: 0 0.75rem;
            font-size: 0.75rem;
            color: #374151;
            white-space: nowrap;
        }
        .crm-filter-reset:hover {
            background: #f9fafb;
        }
        .crm-filter-date {
            height: 2.25rem;
            min-height: 2.25rem;
            display: flex;
            align-items: center;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            background: #ffffff;
            color: #1f2937;
            box-sizing: border-box;
        }
        .crm-filter-date-label {
            padding: 0 0.375rem 0 0.5rem;
            font-size: 0.6875rem;
            color: #6b7280;
            white-space: nowrap;
        }
        .crm-filter-date-input {
            width: 100%;
            height: 100%;
            border: 0;
            background: transparent;
            padding: 0 0.5rem 0 0;
            font-size: 0.75rem;
            color: #1f2937;
            outline: none;
            text-align: right;
        }
        /*
         * Tailwind CDN 的 Preflight 会在其后注入，易打乱表单控件高度。
         * 筛选条内 select / input 统一为 2.25rem（与 .crm-filter-control 设计值一致）。
         */
        .crm-filter-row select.crm-filter-control {
            height: 2.25rem !important;
            min-height: 2.25rem !important;
            max-height: 2.25rem !important;
            line-height: 1.1 !important;
            padding-top: 0.375rem !important;
            padding-bottom: 0.375rem !important;
            box-sizing: border-box !important;
        }
        .crm-filter-row input.crm-filter-control {
            height: 2.25rem !important;
            min-height: 2.25rem !important;
            max-height: 2.25rem !important;
            line-height: 1.1 !important;
            padding-top: 0.375rem !important;
            padding-bottom: 0.375rem !important;
            box-sizing: border-box !important;
        }
        .crm-filter-row input.crm-filter-control[type='search']::-webkit-search-cancel-button {
            -webkit-appearance: none;
            appearance: none;
            display: none;
        }
        .crm-filter-row input.crm-filter-control[type='number'] {
            -moz-appearance: textfield;
        }
        .crm-filter-row input.crm-filter-control[type='number']::-webkit-outer-spin-button,
        .crm-filter-row input.crm-filter-control[type='number']::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .crm-filter-row .crm-filter-date {
            height: 2.25rem !important;
            min-height: 2.25rem !important;
            max-height: 2.25rem !important;
            overflow: hidden;
        }
        .crm-filter-row .crm-filter-date-input[type='date'] {
            height: 2.25rem !important;
            max-height: 2.25rem !important;
            min-height: 0 !important;
            line-height: 1.1 !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            flex: 1 1 0;
            min-width: 0;
            align-self: stretch;
        }
        .crm-filter-row .crm-filter-date-input[type='date']::-webkit-datetime-edit-fields-wrapper {
            padding: 0;
        }
        .crm-filter-row .crm-filter-date-input[type='date']::-webkit-calendar-picker-indicator {
            margin: 0 0 0 0.125rem;
            padding: 0;
            scale: 0.92;
        }
    </style>
</head>
<body class="bg-[#f6f8fa] text-gray-800">
    <div id="login-overlay" class="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] hidden">
        <div class="bg-white p-8 rounded-lg shadow-xl w-96">
            <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">ITO CRM 登录</h2>
            <input id="login-user" type="text" placeholder="用户名" class="w-full p-2 border rounded mb-4">
            <input id="login-pwd" type="password" placeholder="密码" class="w-full p-2 border rounded mb-6">
            <p id="login-err" class="text-sm text-red-600 mb-2 hidden"></p>
            <button type="button" id="login-btn" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">进入系统</button>
        </div>
    </div>

    <div id="main-shell" class="min-h-screen flex flex-col hidden">
        <header class="border-b border-[#30363d] bg-[#010409] text-[#e6edf3] shrink-0 relative z-[100] overflow-visible">
            <div class="max-w-[1280px] mx-auto px-4 flex items-center justify-between min-h-[3.5rem] gap-4 overflow-visible">
                <div class="crm-header-nav-wrap flex items-center flex-1 min-w-0">
                    <a href="/home" class="text-white font-semibold tracking-tight shrink-0 mr-4 md:mr-8">ITO CRM{% block brand_badge %}<span class="text-[#8b949e] font-normal text-xs ml-1.5">V8</span>{% endblock %}</a>
                    {% include "partials/nav.html" %}
                </div>
                {% block header_extra %}{% endblock %}
                <div class="flex items-center gap-3 shrink-0 text-sm">
                    <span id="header-user" class="text-[#8b949e] hidden sm:inline"></span>
                    <button type="button" id="logout-btn" class="text-[#58a6ff] hover:underline font-medium">退出</button>
                </div>
            </div>
        </header>
        <main class="flex-1 min-h-0 flex flex-col {% block main_class %}{% endblock %}">{% block content %}{% endblock %}</main>
    </div>

    <script>
        window.crmAuthHeader = function () {
            var b = localStorage.getItem('crm_b64');
            return b ? { 'Authorization': 'Basic ' + b } : {};
        };
        window.crmFilenameFromDisposition = function (disposition) {
            if (!disposition) { return ''; }
            var utfMatch = disposition.match(/filename\*=UTF-8''([^;]+)/i);
            if (utfMatch && utfMatch[1]) {
                try { return decodeURIComponent(utfMatch[1]); } catch (e) {}
            }
            var asciiMatch = disposition.match(/filename="?([^";]+)"?/i);
            if (asciiMatch && asciiMatch[1]) { return asciiMatch[1]; }
            return '';
        };
        window.crmDownloadBlob = function (blob, disposition, fallbackName) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = window.crmFilenameFromDisposition(disposition) || fallbackName || ('export_' + Date.now() + '.csv');
            a.click();
            URL.revokeObjectURL(url);
        };
        window.crmExportCsv = async function (e) {
            if (e) { e.preventDefault(); }
            var b = localStorage.getItem('crm_b64');
            if (!b) { alert('请先登录'); return; }
            try {
                var r = await fetch('/api/export/clients', { headers: { 'Authorization': 'Basic ' + b } });
                if (!r.ok) { alert('导出失败'); return; }
                var disposition = r.headers.get('Content-Disposition') || '';
                var blob = await r.blob();
                window.crmDownloadBlob(blob, disposition, 'clients_' + Date.now() + '.csv');
            } catch (err) { alert('导出失败'); }
        };

        (function () {
            var overlay = document.getElementById('login-overlay');
            var shell = document.getElementById('main-shell');
            var errEl = document.getElementById('login-err');

            function showLogin(msg) {
                shell.classList.add('hidden');
                overlay.classList.remove('hidden');
                if (msg) { errEl.textContent = msg; errEl.classList.remove('hidden'); }
                else { errEl.classList.add('hidden'); }
            }

            async function verifySession() {
                var b = localStorage.getItem('crm_b64');
                if (!b) { showLogin(); return; }
                try {
                    var r = await fetch('/api/stats', { headers: { 'Authorization': 'Basic ' + b } });
                    if (!r.ok) {
                        localStorage.removeItem('crm_b64');
                        localStorage.removeItem('crm_user');
                        showLogin('会话已失效，请重新登录');
                        return;
                    }
                    overlay.classList.add('hidden');
                    shell.classList.remove('hidden');
                    var u = localStorage.getItem('crm_user') || '';
                    document.getElementById('header-user').textContent = u ? ('欢迎，' + u) : '';
                } catch (e) {
                    showLogin('无法连接服务器');
                }
            }

            document.getElementById('login-btn').onclick = async function () {
                var u = document.getElementById('login-user').value.trim();
                var p = document.getElementById('login-pwd').value;
                errEl.classList.add('hidden');
                try {
                    var b64 = btoa(u + ':' + p);
                    var r = await fetch('/api/stats', { headers: { 'Authorization': 'Basic ' + b64 } });
                    if (!r.ok) { showLogin('账号或密码错误'); return; }
                    localStorage.setItem('crm_b64', b64);
                    localStorage.setItem('crm_user', u);
                    await verifySession();
                } catch (e) { showLogin('服务器连接失败'); }
            };

            document.getElementById('logout-btn').onclick = function () {
                localStorage.removeItem('crm_b64');
                localStorage.removeItem('crm_user');
                document.getElementById('login-pwd').value = '';
                showLogin();
            };

            verifySession();
        })();
    </script>
    {% block page_scripts %}{% endblock %}
</body>
</html>
