<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ITO BMS{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    {# bms-shell-temp1 壳层主题：全局 include，置于 head_extra 之前，确保所有页面都有 shell 样式 #}
    {% include "partials/bms_shell_styles.html" %}
    {% block head_extra %}{% endblock %}
    <style>
        /* Critical fallback when Tailwind CDN is unavailable. */
        .hidden { display: none !important; }
        [v-cloak] { display: none !important; }
        .crm-field-required-mark { color: #dc2626; font-weight: 700; }
        .funnel-layer:hover { filter: brightness(1.1); cursor: pointer; }
        /* 父级若 overflow 非 visible，下拉会被裁切 — nav 禁止横向 overflow 裁剪 */
        .crm-header-nav-wrap { overflow: visible; min-width: 0; }
        .crm-notify-wrap { position: relative; }
        .crm-notify-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border-radius: 0.375rem;
            color: #8b949e;
            background: transparent;
            border: 0;
            cursor: pointer;
            overflow: visible;
        }
        .crm-notify-btn:hover { color: #e6edf3; background: rgba(255,255,255,0.06); }
        .crm-notify-badge {
            position: absolute;
            top: -0.2rem;
            right: -0.35rem;
            min-width: 1rem;
            height: 1rem;
            padding: 0 0.25rem;
            border-radius: 9999px;
            background: #da3633;
            color: #fff;
            font-size: 0.625rem;
            line-height: 1rem;
            font-weight: 700;
            text-align: center;
            z-index: 2;
            box-shadow: 0 0 0 1px #010409;
            pointer-events: none;
        }
        .crm-notify-panel {
            position: absolute;
            right: 0;
            top: calc(100% + 0.35rem);
            width: min(22rem, calc(100vw - 2rem));
            max-height: min(24rem, calc(100vh - 5rem));
            overflow: auto;
            border-radius: 0.75rem;
            border: 1px solid #30363d;
            background: #161b22;
            box-shadow: 0 16px 48px rgba(1, 4, 9, 0.45);
            z-index: 220;
        }
        .crm-notify-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            padding: 0.65rem 0.85rem;
            border-bottom: 1px solid #30363d;
            font-size: 0.8125rem;
            font-weight: 600;
            color: #e6edf3;
        }
        .crm-notify-head-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .crm-notify-action {
            font-size: 0.75rem;
            font-weight: 400;
            color: #8b949e;
            background: transparent;
            border: 0;
            cursor: pointer;
            padding: 0;
        }
        .crm-notify-action:hover { color: #f85149; }
        .crm-notify-row {
            display: flex;
            align-items: stretch;
            border-bottom: 1px solid #21262d;
        }
        .crm-notify-item {
            display: block;
            flex: 1;
            min-width: 0;
            text-align: left;
            padding: 0.7rem 0.85rem;
            border: 0;
            background: transparent;
            color: #e6edf3;
            cursor: pointer;
        }
        .crm-notify-item:hover { background: rgba(255,255,255,0.04); }
        .crm-notify-item.is-read { color: #8b949e; }
        .crm-notify-msg { font-size: 0.8125rem; line-height: 1.45; }
        .crm-notify-time { margin-top: 0.25rem; font-size: 0.6875rem; color: #8b949e; }
        .crm-notify-del {
            flex-shrink: 0;
            align-self: center;
            padding: 0.35rem 0.65rem;
            border: 0;
            background: transparent;
            color: #8b949e;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .crm-notify-del:hover { color: #f85149; }
        .crm-notify-empty { padding: 1rem 0.85rem; font-size: 0.8125rem; color: #8b949e; }
        .gh-nav-item { position: relative; }
        .gh-mega {
            position: absolute; left: 0; top: 100%; padding-top: 0.45rem; z-index: 200;
            opacity: 0; visibility: hidden; transform: translateY(-4px); pointer-events: none;
            transition: opacity 0.12s ease, transform 0.12s ease, visibility 0.12s;
        }
        .gh-nav-item:hover .gh-mega,
        .gh-nav-item:focus-within .gh-mega {
            opacity: 1; visibility: visible; transform: translateY(0); pointer-events: auto;
        }
        .gh-mega-panel {
            border-radius: 0.75rem;
            border: 1px solid #d0d7de;
            background: #ffffff;
            color: #1f2328;
            box-shadow: 0 16px 48px rgba(1, 4, 9, 0.18);
            min-width: 36rem;
            max-width: min(90vw, 52rem);
        }
        .gh-mega-col-h {
            font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em;
            color: #656d76; text-transform: uppercase; margin-bottom: 0.65rem;
        }
        .gh-mega-link {
            display: block; padding: 0.35rem 0; font-size: 0.9rem; color: #1f2328;
            border-radius: 0.25rem;
        }
        .gh-mega-link:hover { color: #0969da; }
        .gh-mega-footer {
            margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid #d8dee4;
            background: #f6f8fa; margin-left: -1rem; margin-right: -1rem;
            margin-bottom: -1rem; padding-left: 1rem; padding-right: 1rem;
            padding-bottom: 0.75rem; border-radius: 0 0 0.75rem 0.75rem;
        }
        .nav-trigger {
            display: inline-flex; align-items: center; gap: 0.25rem;
            padding: 0.75rem 0.75rem; font-size: 0.875rem; font-weight: 500;
            color: #e6edf3; border-radius: 0.375rem; background: transparent; border: none;
            cursor: default; white-space: nowrap;
        }
        .nav-trigger:hover { background: rgba(255,255,255,0.06); }
        .gh-nav-item.nav-active > .nav-trigger { color: #fff; background: rgba(255,255,255,0.08); }
        .crm-btn-rollback {
            border-radius: 0.5rem;
            border: 1px solid #fca5a5;
            background: #ef4444;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: #ffffff;
            transition: background-color 0.15s ease;
        }
        .crm-btn-rollback:hover { background: #dc2626; }
        .crm-currency-cell {
            text-align: right;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }
        .crm-percent-cell {
            text-align: right;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }
        .crm-total-row td {
            background: #f8fafc;
            border-top: 1px solid #cbd5e1;
            color: #1e293b;
            font-weight: 500;
        }
        .crm-total-label {
            font-size: 1.125rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #0f172a;
        }
        /* 主内容区：减轻双指横向滑动触发浏览器「返回上一页」 */
        #main-shell main {
            overscroll-behavior-x: contain;
        }
        /* 显式横向滚动容器：底部留白避免水平滚动条遮挡末行；阻断横向 scroll chaining */
        .crm-h-scroll {
            overflow-x: auto;
            overscroll-behavior-x: contain;
            overscroll-behavior-y: auto;
            scrollbar-gutter: stable;
            padding-bottom: 14px;
            box-sizing: border-box;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        /* 通用：表格内容区滚动 + 表头固定 */
        .crm-table-scroll {
            max-height: var(--crm-table-scroll-max-height, calc(100vh - 260px));
            overflow-x: auto;
            overflow-y: auto;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
        }
        /* 默认表头吸顶；层级须高于 .crm-cell-clip-td-open(20)，避免悬停浮层盖住表头 */
        .crm-table-scroll .crm-table thead th.crm-th {
            position: sticky;
            top: 0;
            z-index: 30;
        }
        .crm-table-scroll .crm-table thead th.crm-th:not(.crm-sticky-right-op):not(.delivery-sticky-left-serial):not(.delivery-sticky-left-key):not(.roster-sticky-left-serial):not(.roster-sticky-left-key):not(.settlement-sticky-serial):not(.settlement-sticky-date):not(.settlement-sticky-customer):not(.employee-files-sticky-name):not(.employee-files-sticky-filename):not(.rms-sticky-serial):not(.rms-sticky-title):not(.rms-sticky-client):not(.rms-candidate-sticky-name):not(.rms-offer-sticky-status):not(.rms-offer-sticky-candidate):not(.opp-sticky-name):not(.opp-sticky-client):not(.req-sticky-title) {
            z-index: 28;
        }
        /* 三键操作列固定宽（colgroup + 单元格双保险） */
        :root {
            --crm-op-col-width: 6.75rem;
            --crm-op-col-width-wide: 13rem;
            --crm-op-col-width-xl: 18rem;
            --crm-col-remarks-min: 12rem;
            --crm-col-created-at-min: 9rem;
        }
        .crm-table th.crm-col-remarks,
        .crm-table td.crm-col-remarks {
            min-width: var(--crm-col-remarks-min);
        }
        .crm-table th.crm-col-created-at,
        .crm-table td.crm-col-created-at {
            min-width: var(--crm-col-created-at-min);
            white-space: nowrap;
        }
        col.crm-col-op {
            width: var(--crm-op-col-width) !important;
            min-width: var(--crm-op-col-width) !important;
            max-width: var(--crm-op-col-width) !important;
        }
        col.crm-col-op-wide {
            width: var(--crm-op-col-width-wide) !important;
            min-width: var(--crm-op-col-width-wide) !important;
            max-width: var(--crm-op-col-width-wide) !important;
        }
        col.crm-col-op-xl {
            width: var(--crm-op-col-width-xl) !important;
            min-width: var(--crm-op-col-width-xl) !important;
            max-width: var(--crm-op-col-width-xl) !important;
        }
        /* 通用：操作列固定在最右侧（与花名册 crm-sticky-right-op 一致） */
        .crm-table th.crm-sticky-right-op,
        .crm-table td.crm-sticky-right-op,
        .crm-table th.roster-sticky-op,
        .crm-table td.roster-sticky-op,
        .visit-table th.crm-sticky-right-op,
        .visit-table td.crm-sticky-right-op {
            width: var(--crm-op-col-width) !important;
            min-width: var(--crm-op-col-width) !important;
            max-width: var(--crm-op-col-width) !important;
            padding-left: 0.35rem !important;
            padding-right: 0.35rem !important;
            overflow: visible !important;
            text-overflow: clip !important;
        }
        .crm-table th.crm-sticky-right-op.crm-op-col-wide,
        .crm-table td.crm-sticky-right-op.crm-op-col-wide,
        .visit-table th.crm-sticky-right-op.crm-op-col-wide,
        .visit-table td.crm-sticky-right-op.crm-op-col-wide,
        .crm-sticky-right-op.crm-op-col-wide {
            width: var(--crm-op-col-width-wide) !important;
            min-width: var(--crm-op-col-width-wide) !important;
            max-width: var(--crm-op-col-width-wide) !important;
        }
        .crm-table th.crm-sticky-right-op.crm-op-col-xl,
        .crm-table td.crm-sticky-right-op.crm-op-col-xl,
        .visit-table th.crm-sticky-right-op.crm-op-col-xl,
        .visit-table td.crm-sticky-right-op.crm-op-col-xl,
        .crm-sticky-right-op.crm-op-col-xl {
            width: var(--crm-op-col-width-xl) !important;
            min-width: var(--crm-op-col-width-xl) !important;
            max-width: var(--crm-op-col-width-xl) !important;
        }
        .crm-sticky-right-op button.mr-2,
        .crm-sticky-right-op .mr-2,
        .roster-sticky-op button.mr-2 {
            margin-right: 0.25rem !important;
        }
        .crm-sticky-right-op,
        .roster-sticky-op {
            position: sticky;
            right: 0;
            width: var(--crm-op-col-width) !important;
            min-width: var(--crm-op-col-width) !important;
            max-width: var(--crm-op-col-width) !important;
            box-sizing: border-box;
            white-space: nowrap;
            overflow: hidden !important;
            text-overflow: clip !important;
            background: #fff;
            background-clip: padding-box;
            border-left: 1px solid #e5e7eb;
            box-shadow: -6px 0 12px -10px rgba(15, 23, 42, 0.14);
            text-align: center;
        }
        .crm-sticky-right-op .crm-op-actions {
            overflow: visible;
        }
        .crm-table tbody .crm-sticky-right-op,
        .crm-table tbody .roster-sticky-op,
        .visit-table tbody .crm-sticky-right-op {
            z-index: 8 !important;
        }
        .crm-table thead .crm-sticky-right-op,
        .crm-table thead .roster-sticky-op,
        .visit-table thead .crm-sticky-right-op {
            top: 0;
            right: 0;
            z-index: 32 !important;
            background: #2f75b5;
            color: #fff;
            border-color: #1f5a94;
            overflow: visible !important;
            text-overflow: clip !important;
        }
        .crm-table thead th.crm-sticky-right-op,
        .crm-table thead th.roster-sticky-op,
        .visit-table thead th.crm-sticky-right-op {
            position: sticky !important;
            right: 0 !important;
            overflow: visible !important;
            text-overflow: clip !important;
        }
        .crm-table tbody .crm-sticky-right-op,
        .crm-table tbody .roster-sticky-op,
        .visit-table tbody .crm-sticky-right-op {
            background: #fff;
        }
        .crm-table tbody tr:nth-child(even) .crm-sticky-right-op,
        .crm-table tbody tr:nth-child(even) .roster-sticky-op,
        .visit-table tbody tr:nth-child(even) .crm-sticky-right-op {
            background: #f6f8fa;
        }
        .crm-table tbody tr:hover .crm-sticky-right-op,
        .crm-table tbody tr:hover .roster-sticky-op,
        .visit-table tbody tr:hover .crm-sticky-right-op {
            background: #eef6ff;
            /* 悬停行的操作列抬高层级（仍低于 thead 的 32），
               使操作按钮的悬停说明浮在下一行之上，避免被相邻行遮挡 */
            z-index: 20 !important;
        }
        .crm-table tfoot .crm-sticky-right-op,
        .crm-table tfoot .roster-sticky-op {
            z-index: 8 !important;
            background: #f9fafb;
        }
        /* 操作列宽辅助类（与 crm-sticky-right-op 组合使用） */
        .crm-table th.crm-op-col,
        .crm-table td.crm-op-col,
        .visit-table th.crm-op-col,
        .visit-table td.crm-op-col {
            padding-left: 0.35rem !important;
            padding-right: 0.35rem !important;
            overflow: visible !important;
            text-overflow: clip !important;
        }
        .crm-op-col {
            width: var(--crm-op-col-width) !important;
            min-width: var(--crm-op-col-width) !important;
            max-width: var(--crm-op-col-width) !important;
            white-space: nowrap;
            box-sizing: border-box;
            text-align: center;
        }
        .crm-op-col-wide {
            width: var(--crm-op-col-width-wide) !important;
            min-width: var(--crm-op-col-width-wide) !important;
            max-width: var(--crm-op-col-width-wide) !important;
            white-space: nowrap;
            box-sizing: border-box;
            overflow: visible !important;
            text-overflow: clip !important;
            text-align: center;
        }
        .crm-op-col-xl {
            width: var(--crm-op-col-width-xl) !important;
            min-width: var(--crm-op-col-width-xl) !important;
            max-width: var(--crm-op-col-width-xl) !important;
            white-space: nowrap;
            box-sizing: border-box;
            overflow: visible !important;
            text-overflow: clip !important;
            text-align: center;
        }
        .crm-op-actions {
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            white-space: nowrap;
            position: relative;
            z-index: 2;
            pointer-events: auto;
        }
        .crm-op-actions button,
        .crm-op-actions a {
            pointer-events: auto;
        }
        .crm-op-btn-detail,
        .crm-op-btn-edit,
        .crm-op-btn-delete,
        .crm-op-btn-handoff {
            font-size: 0.75rem;
            line-height: 1.25;
            font-weight: 500;
            transition: color 0.12s ease;
            text-decoration: none;
        }
        .crm-op-btn-detail { color: #374151; }
        .crm-op-btn-detail:hover {
            color: #111827;
            text-decoration: underline;
        }
        .crm-op-btn-edit { color: #456595; }
        .crm-op-btn-edit:hover {
            color: #3a567f;
            text-decoration: underline;
        }
        .crm-op-btn-delete { color: #dc2626; }
        .crm-op-btn-delete:hover {
            color: #b91c1c;
            text-decoration: underline;
        }
        .crm-op-btn-handoff { color: #b45309; }
        .crm-op-btn-handoff:hover {
            text-decoration: underline;
        }
        /* 全局表格：蓝表头、斑马纹、整行悬停高亮（客户拜访 / 员工访谈等统一风格） */
        .crm-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        /* sticky 操作列与 collapse 组合会导致列边界错位、表头无法横向冻结 */
        .crm-table:has(.crm-sticky-right-op),
        .visit-table:has(.crm-sticky-right-op) {
            border-collapse: separate;
            border-spacing: 0;
        }
        .crm-table th.crm-th {
            padding: 0.5rem 0.65rem;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: #fff;
            background: #2f75b5;
            border: 1px solid #1f5a94;
            border-bottom: 1px solid #1f5a94;
            white-space: nowrap;
            vertical-align: middle;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .crm-table th.crm-th:last-child { border-right: 1px solid #1f5a94; }
        /* 表头字段图标（全局）：每个列头文字前置一枚同色描边图标，
           颜色继承表头文字色（默认蓝底白字）。详见 page-conventions 第 9 节 */
        .crm-table th.crm-th .ct-th-icon {
            display: inline-block;
            width: 14px;
            height: 14px;
            margin-right: 6px;
            vertical-align: middle;
        }
        .crm-table td.crm-td {
            padding: 0.5rem 0.6rem;
            font-size: 0.8rem;
            color: #1f2937;
            border: 1px solid #d0d7de;
            border-top: 1px solid #d0d7de;
            vertical-align: top;
            background: #fff;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .crm-table td.crm-td.crm-name-cell,
        .visit-table td.visit-td.crm-name-cell {
            color: #0969da;
            font-weight: 700;
        }
        .crm-table td.crm-td.crm-name-cell .crm-name-link,
        .visit-table td.visit-td.crm-name-cell .crm-name-link {
            color: inherit;
            font-weight: inherit;
            font-size: inherit;
            line-height: inherit;
            font-family: inherit;
            text-align: left;
            background: transparent;
            border: 0;
            padding: 0;
            margin: 0;
            cursor: pointer;
            max-width: 100%;
        }
        .crm-table td.crm-td.crm-name-cell .crm-name-link:hover,
        .visit-table td.visit-td.crm-name-cell .crm-name-link:hover {
            text-decoration: underline;
        }
        .crm-table tbody tr:nth-child(even) td.crm-td {
            background: #f6f8fa;
        }
        .crm-table tbody tr:hover td.crm-td {
            background: #eef6ff;
        }
        /* 冻结列：表头与数据行随斑马纹 / 悬停同步变色 */
        .crm-table thead .delivery-sticky-left-serial,
        .crm-table thead .delivery-sticky-left-key,
        .crm-table thead .roster-sticky-left-serial,
        .crm-table thead .roster-sticky-left-key,
        .crm-table thead .settlement-sticky-serial,
        .crm-table thead .settlement-sticky-date,
        .crm-table thead .settlement-sticky-customer,
        .crm-table thead .employee-files-sticky-name,
        .crm-table thead .employee-files-sticky-filename,
        .crm-table thead .turnover-sticky-right-actions,
        .crm-table thead .rms-sticky-serial,
        .crm-table thead .rms-sticky-title,
        .crm-table thead .req-sticky-title,
        .crm-table thead .rms-sticky-client,
        .crm-table thead .rms-candidate-sticky-name,
        .crm-table thead .rms-offer-sticky-status,
        .crm-table thead .rms-offer-sticky-candidate,
        .crm-table thead .opp-sticky-name,
        .crm-table thead .opp-sticky-client {
            background: #2f75b5;
            color: #fff;
            border-color: #1f5a94;

            width: min(52vw, 30rem);
            height: min(52vw, 30rem);
            background: rgba(168, 85, 247, 0.32);
            top: -18%;
            right: -12%;
            opacity: 0.85;
        }
        .crm-login-blob--b {
            width: min(48vw, 26rem);
            height: min(48vw, 26rem);
            background: rgba(79, 70, 229, 0.22);
            bottom: -20%;
            left: -10%;

        .crm-login-input:-webkit-autofill,

        .crm-login-logo-wrap {

            margin: 0 auto 0.75rem;

        .crm-login-logo {

            width: 100%;
            max-height: 4.75rem;

        /* 偏小字重、圆润无衬线（Plus Jakarta Sans + 系统中文字体）；浅薰衣草字色 + 轻外晕 */
        .crm-login-title {
            margin: 0.625rem 0 0;
            font-family: "Plus Jakarta Sans", ui-rounded, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei UI", sans-serif;

            letter-spacing: 0.14em;

        /* 深薰衣草胶囊按钮（较 #b197e2 更深，仍半透明感） */
        .crm-login-btn {
            width: 100%;
            margin-top: 0.25rem;
            padding: 0.8125rem 1rem;
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(91, 65, 145, 0.82);
            box-shadow:
                0 10px 28px rgba(61, 40, 110, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.18);
            color: #ffffff;
            font-size: 0.9375rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;

        .crm-login-btn:hover {
            background: rgba(105, 75, 165, 0.9);
            box-shadow:

                inset 0 1px 0 rgba(255, 255, 255, 0.22);
        }
        .crm-login-btn:active {
            transform: scale(0.99);
        }
        .crm-login-btn:focus-visible {
            outline: 2px solid rgba(167, 139, 250, 0.45);
            outline-offset: 2px;
        }
        /* 登录卡片：Premium 式深紫垂直渐变面板 + 细分隔线 */
        .crm-login-panel {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 26rem;
            padding: 2.25rem 1.85rem 2rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: linear-gradient(
                168deg,
                rgba(58, 46, 98, 0.97) 0%,
                rgba(32, 26, 54, 0.98) 38%,
                rgba(14, 11, 22, 0.99) 72%,
                rgba(8, 7, 14, 1) 100%
            );
            box-shadow:
                0 0 0 1px rgba(177, 151, 226, 0.06),
                0 28px 72px rgba(0, 0, 0, 0.52),
                inset 0 1px 0 rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }
        .crm-login-panel-head {
            padding-bottom: 1.25rem;
        }
        .crm-login-divider {
            height: 1px;
            margin: 0 0 1.125rem;
            border: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
        }
        .crm-login-lead {
            margin: 0 0 0.25rem;
            font-size: 0.8125rem;
            line-height: 1.55;
            letter-spacing: 0.02em;
            color: rgba(255, 255, 255, 0.58);
            text-align: center;
        }
        .crm-login-form {
            margin-top: 1.35rem;
            display: flex; flex-direction: column; gap: 1rem;
        }
        .crm-login-input {
            display: block; width: 100%; box-sizing: border-box; border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.3);
            padding: 0.75rem 1rem; font-size: 0.9375rem; line-height: 1.35; color: #f1f5f9; outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        .crm-login-input::placeholder { color: rgba(221, 214, 254, 0.45); }
        .crm-login-input:focus { border-color: rgba(167, 139, 250, 0.5); box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.25); }
        #login-err,
        #pwd-change-err {
            text-align: center; font-size: 0.875rem; font-weight: 500; color: rgba(251, 113, 133, 0.96);
        }
        /* 改密弹窗：弱化浏览器将字符渲染成可读字形的情况（兜底掩码） */
        #pwd-change-overlay { z-index: 110; }
        #pwd-change-overlay .crm-login-panel { max-width: 28rem; }
        #pwd-change-overlay .crm-pwd-change-form > div { display: flex; flex-direction: column; gap: 0.25rem; }
        #pwd-change-overlay .crm-pwd-change-form label {
            font-size: 0.75rem; font-weight: 500; color: rgba(221, 214, 254, 0.82);
        }
        #pwd-change-overlay .crm-pwd-change-form input[type='password'] { -webkit-text-security: disc; }
        #pwd-change-form > div:last-child { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.25rem; }
        #pwd-change-cancel,
        #pwd-change-save {
            width: 100%; border-radius: 9999px; border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 0.75rem 1.25rem; font-size: 0.9375rem; font-weight: 600; transition: background 0.15s ease; cursor: pointer;
        }
        #pwd-change-cancel { background: rgba(0, 0, 0, 0.25); color: #f1f5f9; }
        #pwd-change-cancel:hover { background: rgba(255, 255, 255, 0.1); }
        #pwd-change-save {
            background: rgba(91, 65, 145, 0.82); color: #ffffff; box-shadow: 0 10px 28px rgba(61, 40, 110, 0.45);
        }
        #pwd-change-save:hover { background: rgba(105, 75, 165, 0.9); }
        @media (min-width: 640px) {
            #pwd-change-form > div:last-child {
                flex-direction: row; justify-content: flex-end; gap: 0.75rem;
            }
            #pwd-change-cancel, #pwd-change-save { width: auto; }
        }
        .crm-handbook-chat-shell {
            position: fixed;
            right: max(1rem, env(safe-area-inset-right, 0px) + 1rem);
            bottom: max(1rem, env(safe-area-inset-bottom, 0px) + 1rem);
            z-index: 140;
            pointer-events: none;
            perspective: 760px;
        }
        .crm-handbook-chat-shell > * {
            pointer-events: auto;
        }
        .crm-handbook-chat-ball {
            width: 5rem;
            height: 5rem;
            border-radius: 999px;
            border: 0;
            background: transparent;
            padding: 0;
            position: relative;
            isolation: isolate;
            transform: rotateX(13deg) rotateY(-16deg) translateZ(0);
            transform-style: preserve-3d;
            transition: transform 0.18s ease;
            animation: crmChatBallFloat 3.6s ease-in-out infinite;
            filter: drop-shadow(0 14px 28px rgba(2, 6, 23, 0.36));
        }
        @keyframes crmChatBallFloat {
            0%, 100% { transform: translateY(0) rotateX(13deg) rotateY(-16deg) rotateZ(-1.8deg) translateZ(0); }
            50% { transform: translateY(-9px) rotateX(11deg) rotateY(-16deg) rotateZ(1.8deg) translateZ(7px); }
        }
        .crm-handbook-chat-ball::before {
            content: '';
            position: absolute;
            pointer-events: none;
            border-radius: 999px;
            inset: 10% 15% 47% 18%;
            z-index: 2;
            background: radial-gradient(ellipse at 32% 26%, rgba(255, 255, 255, 0.46), rgba(255, 255, 255, 0) 74%);
            filter: blur(10px);
            opacity: 0.42;
            transform: translateZ(34px) rotate(-11deg);
            mix-blend-mode: screen;
        }
        .crm-handbook-chat-ball::after {
            content: '';
            position: absolute;
            pointer-events: none;
            left: 18%;
            right: 18%;
            bottom: -6%;
            height: 18%;
            border-radius: 999px;
            background: radial-gradient(ellipse at center, rgba(99, 102, 241, 0.3), rgba(99, 102, 241, 0) 72%);
            filter: blur(7px);
            opacity: 0.62;
            z-index: 0;
            transform: translateZ(0);
        }
        .crm-handbook-chat-ball:hover {
            animation: none;
            transform: translateY(-10px) rotateX(13deg) rotateY(-16deg) translateZ(22px);
        }
        .crm-handbook-chat-ball:active {
            animation: none;
            transform: translateY(1px) rotateX(9deg) rotateY(-10deg) translateZ(6px) scale(0.965);
        }
        @media (prefers-reduced-motion: reduce) {
            .crm-handbook-chat-ball {
                animation: none;
            }
        }
        .crm-handbook-chat-ball img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: relative;
            z-index: 1;
            transform: translateZ(28px);
            background: transparent;
        }
        .crm-handbook-chat-panel {
            width: min(26rem, calc(100vw - 2rem));
            height: min(38rem, calc(100vh - 7rem));
            border-radius: 1.25rem;
            border: 1px solid rgba(226, 232, 240, 0.9);
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.24);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            overflow: hidden;
        }
        .crm-handbook-chat-scroll {
            scrollbar-width: thin;
        }
        .crm-handbook-chat-msg {
            max-width: 92%;
            border-radius: 1rem;
            padding: 0.75rem 0.85rem;
            font-size: 0.875rem;
            line-height: 1.55;
        }
        .crm-handbook-chat-msg.user {
            margin-left: auto;
            background: #4f46e5;
            color: #ffffff;
        }
        .crm-handbook-chat-msg.assistant {
            margin-right: auto;
            background: #f8fafc;
            color: #1f2937;
            border: 1px solid #e5e7eb;
        }
        .crm-handbook-source-btn {
            display: block;
            width: 100%;
            text-align: left;
            border-radius: 0.8rem;
            border: 1px solid #e0e7ff;
            background: #ffffff;
            padding: 0.65rem 0.7rem;
            transition: background-color 0.12s ease, border-color 0.12s ease;
        }
        .crm-handbook-source-btn:hover {
            background: #eef2ff;
            border-color: #c7d2fe;
        }
        .crm-handbook-source-snippet {
            margin-top: 0.5rem;
            max-height: 7.4rem;
            overflow: hidden;
            font-size: 0.75rem;
            line-height: 1.55;
            color: #475569;
        }
        .crm-handbook-hit {
            border-radius: 0.25rem;
            background: #fef08a;
            color: #713f12;
            padding: 0 0.12rem;
            font-weight: 700;
        }
    </style>

                        <button type="button" id="crm-notify-btn" class="crm-notify-btn" aria-label="通知" aria-expanded="false" aria-controls="crm-notify-panel">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                            </svg>
                            <span id="crm-notify-badge" class="crm-notify-badge hidden">0</span>
                        </button>
                        <div id="crm-notify-panel" class="crm-notify-panel hidden" role="dialog" aria-label="通知列表">
                            <div class="crm-notify-head">
                                <span>通知</span>
                                <div class="crm-notify-head-actions">
                                    <button type="button" id="crm-notify-delete-all" class="crm-notify-action hidden">删除全部</button>
                                    <span id="crm-notify-count" class="text-[#8b949e] font-normal"></span>
                                </div>
                            </div>
                            <div id="crm-notify-list"></div>
                        </div>
                    </div>
                </div>
            </header>
            <main class="flex-1 min-h-0 flex flex-col {% block main_class %}{% endblock %}">{% block content %}{% endblock %}</main>
        </div>
    </div>

    {% block handbook_assistant %}
    <div id="handbook-assistant" class="crm-handbook-chat-shell hidden" aria-live="polite">
        <div id="handbook-assistant-panel" class="crm-handbook-chat-panel hidden flex-col">
            <div class="flex items-start justify-between gap-3 border-b border-slate-200 bg-indigo-50/80 px-4 py-3">
                <div class="min-w-0">
                    <p class="text-sm font-semibold text-slate-900">手册问答</p>
                    <p class="mt-0.5 text-xs text-slate-500">基于已索引 PDF / 音视频锚点 / 元数据检索</p>
                </div>
                <button id="handbook-assistant-close" type="button" class="rounded-full px-2 py-1 text-lg leading-none text-slate-400 hover:bg-white hover:text-slate-700" aria-label="关闭">&times;</button>
            </div>
            <div id="handbook-assistant-messages" class="crm-handbook-chat-scroll flex-1 space-y-3 overflow-y-auto bg-white px-3 py-3">
                <div class="crm-handbook-chat-msg assistant">
                    你可以问“报销流程”“试用期规定”“中诺培训视频”等。我会给出相关答案，并在下方附上可点击的来源参考。
                </div>
            </div>
            <form id="handbook-assistant-form" class="border-t border-slate-200 bg-slate-50 p-3">
                <div class="flex items-end gap-2">
                    <textarea id="handbook-assistant-input" rows="1" class="min-h-[2.5rem] flex-1 resize-none rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" placeholder="输入问题，回车发送"></textarea>
                    <button id="handbook-assistant-send" type="submit" class="rounded-xl bg-indigo-600 px-3 py-2 text-sm font-semibold text-white hover:bg-indigo-700 disabled:opacity-50">发送</button>
                </div>
                <p id="handbook-assistant-error" class="mt-2 hidden text-xs text-red-700"></p>
            </form>
        </div>
        <button id="handbook-assistant-ball" type="button" class="crm-handbook-chat-ball flex items-center justify-center" title="手册问答" aria-label="打开手册问答">
            <img src="/static/images/chatbot-logo-batman4.png?v=batman4" alt="" decoding="async" />
        </button>
    </div>
    {% endblock %}

    <script>
        window.crmPermissions = [];
        window.crmIsSuper = false;
        window.crmRecruitmentNavOnly = false;
        window.crmAuthMode = (document.body && document.body.getAttribute('data-crm-auth-mode')) || 'rbac';
        window.crmMeUser = null;

        window.crmAuthHeader = function () {
            if (window.crmAuthMode === 'rbac') {
                return {};
            }
            var b = localStorage.getItem('crm_b64');
            return b ? { 'Authorization': 'Basic ' + b } : {};
        };

        window.crmSyncHeaderHeight = function () {
            var header = document.querySelector('#main-shell .bms-topbar');
            if (!header) {
                document.documentElement.style.setProperty('--crm-header-height', '3.5rem');
                return;
            }
            var shell = document.getElementById('main-shell');
            if (shell && shell.classList.contains('hidden')) {
                return;
            }
            document.documentElement.style.setProperty(
                '--crm-header-height',
                header.getBoundingClientRect().bottom + 'px'
            );
        };
        window.addEventListener('resize', window.crmSyncHeaderHeight);
        document.addEventListener('DOMContentLoaded', function () {
            window.crmSyncHeaderHeight();
            var header = document.querySelector('#main-shell .bms-topbar');
            if (header && typeof ResizeObserver !== 'undefined') {
                new ResizeObserver(window.crmSyncHeaderHeight).observe(header);
            }
        });
        document.addEventListener('crm-shell-ready', window.crmSyncHeaderHeight);

        /* ---- bms-shell-temp1 侧边栏交互：手风琴展开 / 窄屏抽屉 / 二级 active 兜底 ---- */
        window.crmInitBmsSidebar = function () {
            var shell = document.querySelector('.bms-shell.bms-shell-temp1');
            if (!shell || shell.__bmsSidebarInit) { return; }
            shell.__bmsSidebarInit = true;

            // 一级 chevron / 触发行：展开 / 收起二级（手风琴：同时只展开一个一级分组）
            shell.querySelectorAll('.bms-nav-trigger').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var group = btn.closest('.bms-nav-group');
                    if (!group) { return; }
                    var willOpen = !group.classList.contains('is-open');
                    if (willOpen) {
                        // 展开当前分组前，收起其他已展开的一级分组
                        shell.querySelectorAll('.bms-nav-group.is-open').forEach(function (g) {
                            if (g === group) { return; }
                            g.classList.remove('is-open');
                            var t = g.querySelector('.bms-nav-trigger');
                            if (t) { t.setAttribute('aria-expanded', 'false'); }
                        });
                    }
                    group.classList.toggle('is-open', willOpen);
                    btn.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
                });
            });

            // 窄屏汉堡抽屉
            var ham = document.getElementById('bms-hamburger');
            var backdrop = shell.querySelector('.bms-sidebar-backdrop');
            function closeDrawer() {
                shell.classList.remove('bms-drawer-open');
                if (ham) { ham.setAttribute('aria-expanded', 'false'); }
            }
            if (ham) {
                ham.addEventListener('click', function () {
                    var open = shell.classList.toggle('bms-drawer-open');
                    ham.setAttribute('aria-expanded', open ? 'true' : 'false');
                });
            }
            if (backdrop) { backdrop.addEventListener('click', closeDrawer); }
            shell.querySelectorAll('.bms-nav-link').forEach(function (a) {
                a.addEventListener('click', closeDrawer);
            });

            // 侧栏 light/dark 切换（仅换侧栏颜色，持久化到 localStorage）
            var themeBtn = document.getElementById('bms-theme-toggle');
            if (themeBtn) {
                function syncTheme() {
                    var isDark = shell.classList.contains('bms-sidebar-dark');
                    themeBtn.setAttribute('aria-pressed', isDark ? 'true' : 'false');
                    var label = themeBtn.querySelector('.bms-theme-label');
                    if (label) { label.textContent = isDark ? '浅色主题' : '深色主题'; }
                }
                syncTheme();
                themeBtn.addEventListener('click', function () {
                    var isDark = shell.classList.toggle('bms-sidebar-dark');
                    try { localStorage.setItem('bmsSidebarTheme', isDark ? 'dark' : 'light'); } catch (e) {}
                    syncTheme();
                });
            }

            // 二级 active 前端兜底：最长 href 匹配（服务端已标则跳过）
            function normPath(p) { p = (p || '').replace(/\/+$/, ''); return p || '/'; }
            if (!shell.querySelector('.bms-nav-link.is-current')) {
                var cur = normPath(window.location.pathname);
                var best = null, bestLen = -1;
                shell.querySelectorAll('.bms-nav-link[href]').forEach(function (a) {
                    var h = normPath(a.getAttribute('href'));
                    if (cur === h || cur.indexOf(h + '/') === 0) {
                        if (h.length > bestLen) { bestLen = h.length; best = a; }
                    }
                });
                if (best) { best.classList.add('is-current'); }
            }
            // 当前二级所在分组展开
            var current = shell.querySelector('.bms-nav-link.is-current');
            if (current) {
                var g = current.closest('.bms-nav-group');
                if (g) {
                    g.classList.add('is-open');
                    var t = g.querySelector('.bms-nav-trigger');
                    if (t) { t.setAttribute('aria-expanded', 'true'); }
                }
            }
        };
        document.addEventListener('DOMContentLoaded', window.crmInitBmsSidebar);
        document.addEventListener('crm-shell-ready', window.crmInitBmsSidebar);

        window.crmHasPermission = function (code) {
            if (window.crmAuthMode !== 'rbac') {
                return true;
            }
            if (window.crmIsSuper) {
                return true;
            }
            return (window.crmPermissions || []).indexOf(code) >= 0;
        };

        window.crmApplyNavPermissions = function () {
            if (window.crmAuthMode !== 'rbac') {
                return;
            }
            if (window.crmRecruitmentNavOnly) {
                document.querySelectorAll('.bms-nav-group:not([data-crm-nav-recruitment-allow])').forEach(function (el) {
                    el.style.display = 'none';
                });
                var brand = document.querySelector('.bms-brand');
                if (brand) brand.setAttribute('href', '/rms');
            }
            document.querySelectorAll('[data-crm-nav-perm],[data-crm-nav-any],[data-crm-nav-super]').forEach(function (el) {
                if (window.crmRecruitmentNavOnly && !el.closest('[data-crm-nav-recruitment-allow]')) {
                    return;
                }
                if (el.hasAttribute('data-crm-nav-super')) {
                    el.style.display = window.crmIsSuper ? '' : 'none';
                    return;
                }
                var ok = false;
                var any = el.getAttribute('data-crm-nav-any');
                if (any) {
                    any.split(',').forEach(function (p) {
                        if (window.crmHasPermission(p.trim())) {
                            ok = true;
                        }
                    });
                } else {
                    var need = el.getAttribute('data-crm-nav-perm');
                    ok = !need || window.crmHasPermission(need);
                }
                el.style.display = ok ? '' : 'none';
            });
        };

        window.crmNotifications = [];

        window.crmFormatNotifyTime = function (raw) {
            if (!raw) return '';
            var d = new Date(raw);
            if (isNaN(d.getTime())) return String(raw).slice(0, 16);
            var pad = function (n) { return n < 10 ? '0' + n : String(n); };
            return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
        };

        window.crmNotifyIsUnread = function (item) {
            return !(item && String(item.read_at || '').trim());
        };

        window.crmRenderNotifications = function () {
            var wrap = document.getElementById('crm-notify-wrap');
            var badge = document.getElementById('crm-notify-badge');
            var countEl = document.getElementById('crm-notify-count');
            var deleteAllBtn = document.getElementById('crm-notify-delete-all');
            var listEl = document.getElementById('crm-notify-list');
            if (!wrap || !badge || !countEl || !listEl) return;
            var items = window.crmNotifications || [];
            var unread = items.filter(function (n) { return window.crmNotifyIsUnread(n); }).length;
            wrap.classList.remove('hidden');
            if (unread > 0) {
                badge.textContent = unread > 99 ? '99+' : String(unread);
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
            countEl.textContent = unread > 0 ? (unread + ' 条未读') : '暂无未读';
            if (deleteAllBtn) {
                deleteAllBtn.classList.toggle('hidden', !items.length);
            }
            if (!items.length) {
                listEl.innerHTML = '<div class="crm-notify-empty">暂无通知</div>';
                return;
            }
            listEl.innerHTML = items.map(function (n) {
                var cls = 'crm-notify-item' + (window.crmNotifyIsUnread(n) ? '' : ' is-read');
                var msg = String(n.message || '通知').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                var time = window.crmFormatNotifyTime(n.created_at);
                return '<div class="crm-notify-row">'
                    + '<button type="button" class="' + cls + '" data-notify-id="' + n.id + '">'
                    + '<div class="crm-notify-msg">' + msg + '</div>'
                    + (time ? '<div class="crm-notify-time">' + time + '</div>' : '')
                    + '</button>'
                    + '<button type="button" class="crm-notify-del" data-notify-del="' + n.id + '" aria-label="删除">删除</button>'
                    + '</div>';
            }).join('');
        };

        window.crmSetNotifyPanelOpen = function (open) {
            var btn = document.getElementById('crm-notify-btn');
            var panel = document.getElementById('crm-notify-panel');
            if (!btn || !panel) return;
            panel.classList.toggle('hidden', !open);
            btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        };

        window.crmDeleteNotification = async function (notificationId) {
            try {
                var r = await fetch('/api/notifications/' + notificationId, {
                    method: 'DELETE',
                    credentials: 'same-origin',
                    headers: window.crmAuthHeader(),
                });
                if (!r.ok) return;
                window.crmNotifications = (window.crmNotifications || []).filter(function (n) {
                    return Number(n.id) !== Number(notificationId);
                });
                window.crmRenderNotifications();
            } catch (e) { /* ignore */ }
        };

        window.crmDeleteAllNotifications = async function () {
            if (!window.crmNotifications || !window.crmNotifications.length) return;
            var ok = false;
            if (typeof window.crmConfirmDeleteDialog === 'function') {
                ok = await window.crmConfirmDeleteDialog({
                    title: '删除全部通知',
                    targetText: '确定删除全部通知？',
                    hint: '删除后将从通知列表移除。',
                });
            } else {
                ok = window.confirm('确定删除全部通知？');
            }
            if (!ok) return;
            try {
                var r = await fetch('/api/notifications', {
                    method: 'DELETE',
                    credentials: 'same-origin',
                    headers: window.crmAuthHeader(),
                });
                if (!r.ok) return;
                window.crmNotifications = [];
                window.crmRenderNotifications();
            } catch (e) { /* ignore */ }
        };

        window.crmOpenNotification = async function (notificationId) {
            var item = (window.crmNotifications || []).find(function (n) {
                return Number(n.id) === Number(notificationId);
            });
            if (!item) return;
            if (window.crmNotifyIsUnread(item)) {
                try {
                    await fetch('/api/notifications/' + item.id + '/read', {
                        method: 'POST',
                        credentials: 'same-origin',
                        headers: window.crmAuthHeader(),
                    });
                    item.read_at = new Date().toISOString();
                    window.crmRenderNotifications();
                } catch (e) { /* ignore */ }
            }
            window.crmSetNotifyPanelOpen(false);
            if (item.link_url) {
                if (typeof window.crmRmsNavigateToOffer === 'function' && window.crmRmsNavigateToOffer(item.link_url)) {
                    return;
                }
                window.location.href = item.link_url;
            }
        };

        window.crmRefreshNotifications = async function () {
            var wrap = document.getElementById('crm-notify-wrap');
            if (!wrap) return;
            try {
                var r = await fetch('/api/notifications', {
                    credentials: 'same-origin',
                    headers: window.crmAuthHeader(),
                });
                if (!r.ok) {
                    wrap.classList.add('hidden');
                    window.crmNotifications = [];
                    return;
                }
                var data = await r.json();
                window.crmNotifications = Array.isArray(data) ? data : [];
                window.crmRenderNotifications();
            } catch (e) {
                wrap.classList.add('hidden');
                window.crmNotifications = [];
            }
        };

        window.crmStartNotificationPolling = function () {
            if (window.__crmNotifyPollStarted) return;
            window.__crmNotifyPollStarted = true;
            var pollMs = 30000;
            window.setInterval(function () {
                if (document.hidden) return;
                window.crmRefreshNotifications();
            }, pollMs);
            document.addEventListener('visibilitychange', function () {
                if (!document.hidden) window.crmRefreshNotifications();
            });
            window.addEventListener('focus', function () {
                window.crmRefreshNotifications();
            });
        };

        window.crmInitNotifications = function () {
            if (window.__crmNotifyInited) return;
            window.__crmNotifyInited = true;
            var btn = document.getElementById('crm-notify-btn');
            var panel = document.getElementById('crm-notify-panel');
            var listEl = document.getElementById('crm-notify-list');
            var deleteAllBtn = document.getElementById('crm-notify-delete-all');
            if (!btn || !panel || !listEl) return;
            btn.addEventListener('click', function (e) {
                e.stopPropagation();
                var open = panel.classList.contains('hidden');
                window.crmSetNotifyPanelOpen(open);
                if (open) window.crmRefreshNotifications();
            });
            if (deleteAllBtn) {
                deleteAllBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    window.crmDeleteAllNotifications();
                });
            }
            listEl.addEventListener('click', function (e) {
                var delBtn = e.target.closest('[data-notify-del]');
                if (delBtn) {
                    e.stopPropagation();
                    var delId = delBtn.getAttribute('data-notify-del');
                    if (delId) window.crmDeleteNotification(delId);
                    return;
                }
                var target = e.target.closest('[data-notify-id]');
                if (!target) return;
                var id = target.getAttribute('data-notify-id');
                if (id) window.crmOpenNotification(id);
            });
            document.addEventListener('click', function (e) {
                var wrap = document.getElementById('crm-notify-wrap');
                if (!wrap || wrap.classList.contains('hidden')) return;
                if (wrap.contains(e.target)) return;
                window.crmSetNotifyPanelOpen(false);
            });
            window.crmStartNotificationPolling();
        };

        window.crmFileAccessUrl = function (storedPath) {
            if (!storedPath) { return ''; }
            return '/api/files/access?path=' + encodeURIComponent(storedPath);
        };
        window.crmFetchAuthenticatedBlob = async function (storedPathOrUrl) {
            var path = String(storedPathOrUrl || '');
            if (path.indexOf('/api/files/access') === 0) {
                var u = new URL(path, window.location.origin);
                path = u.searchParams.get('path') || '';
            } else if (path.indexOf('/previews/') === 0) {
                path = path.slice('/previews/'.length);
            }
            var url = path.indexOf('/api/') === 0 ? path : window.crmFileAccessUrl(path);
            var r = await fetch(url, { headers: window.crmAuthHeader(), credentials: 'same-origin' });
            if (!r.ok) { throw new Error('无法加载文件'); }
            return await r.blob();
        };
        window.crmOpenAuthenticatedFile = async function (storedPathOrUrl) {
            var blob = await window.crmFetchAuthenticatedBlob(storedPathOrUrl);
            var obj = URL.createObjectURL(blob);
            window.open(obj, '_blank');
            setTimeout(function () { URL.revokeObjectURL(obj); }, 120000);
        };
        window.crmEnsureLegacySession = async function () {
            var b = localStorage.getItem('crm_b64');
            if (!b) { return false; }
            try {
                var r = await fetch('/api/auth/legacy-bootstrap', {
                    method: 'POST',
                    headers: { 'Authorization': 'Basic ' + b },
                    credentials: 'same-origin',
                });
                return r.ok;
            } catch (e) {
                return false;
            }
        };
        window.crmFilenameFromDisposition = function (disposition) {
            if (!disposition) { return ''; }
            var utfMatch = disposition.match(/filename\*=UTF-8''([^;]+)/i);
            if (utfMatch && utfMatch[1]) {
                try { return decodeURIComponent(utfMatch[1]); } catch (e) {}
            }
            var asciiMatch = disposition.match(/filename="?([^";]+)"?/i);
            if (asciiMatch && asciiMatch[1]) { return asciiMatch[1]; }
            return '';
        };
        window.crmDownloadBlob = function (blob, disposition, fallbackName) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = window.crmFilenameFromDisposition(disposition) || fallbackName || ('export_' + Date.now() + '.csv');
            a.click();
            URL.revokeObjectURL(url);
        };
        window.crmConfirmDeleteDialog = function (opts) {
            var options = opts || {};
            var title = String(options.title || '确认删除');
            var targetText = String(options.targetText || '').trim();
            var hint = String(options.hint || '').trim();
            var zIndex = Number(options.zIndex || 90);
            var confirmText = String(options.confirmText || '确认删除');
            var cancelText = String(options.cancelText || '取消');
            var singleButton = !!options.singleButton;
            var confirmClass = String(
                options.confirmClass
                || (singleButton
                    ? 'flex-1 py-2 rounded-md bg-[#4C6491] text-white text-sm font-medium hover:bg-[#3D5176]'
                    : 'flex-1 py-2 rounded-md bg-red-600 text-white text-sm font-medium hover:bg-red-700')
            );
            return new Promise(function (resolve) {
                var done = false;
                function finish(ok) {
                    if (done) { return; }
                    done = true;
                    document.removeEventListener('keydown', onKeyDown, true);
                    if (overlay && overlay.parentNode) {
                        overlay.parentNode.removeChild(overlay);
                    }
                    resolve(!!ok);
                }
                function onKeyDown(e) {
                    if (e.key !== 'Escape') { return; }
                    e.preventDefault();
                    e.stopPropagation();
                    finish(false);
                }

                var overlay = document.createElement('div');
                overlay.className = 'crm-esc-modal fixed inset-0 bg-black/40 flex items-center justify-center p-4';
                overlay.style.zIndex = String(zIndex);
                var panel = document.createElement('div');
                panel.className = 'bg-white rounded-lg shadow-xl w-full max-w-md p-4 sm:p-5';
                var h3 = document.createElement('h3');
                h3.className = 'font-semibold text-lg text-gray-800 mb-3';
                h3.textContent = title;
                var pTarget = document.createElement('p');
                pTarget.className = 'text-sm text-gray-600 mb-2';
                pTarget.textContent = targetText || '确认后将执行删除操作。';
                var pHint = document.createElement('p');
                pHint.className = 'text-xs text-gray-400 mb-4';
                pHint.textContent = hint || '删除后将从当前列表移除。';
                var actions = document.createElement('div');
                actions.className = 'flex gap-2';
                var cancelBtn = document.createElement('button');
                cancelBtn.type = 'button';
                cancelBtn.className = 'flex-1 py-2 rounded-md bg-gray-100 text-gray-800 text-sm font-medium hover:bg-gray-200';
                cancelBtn.textContent = cancelText;
                cancelBtn.setAttribute('data-crm-esc-close', '1');
                var confirmBtn = document.createElement('button');
                confirmBtn.type = 'button';
                confirmBtn.className = confirmClass;
                confirmBtn.textContent = confirmText;
                if (!singleButton) {
                    actions.appendChild(cancelBtn);
                }
                actions.appendChild(confirmBtn);
                panel.appendChild(h3);
                panel.appendChild(pTarget);
                panel.appendChild(pHint);
                panel.appendChild(actions);
                overlay.appendChild(panel);
                overlay.addEventListener('click', function (e) {
                    if (e.target === overlay) { finish(false); }
                });
                cancelBtn.addEventListener('click', function () { finish(false); });
                confirmBtn.addEventListener('click', function () { finish(singleButton ? false : true); });
                document.addEventListener('keydown', onKeyDown, true);
                document.body.appendChild(overlay);
            });
        };
        window.crmConfirmActionDialog = function (opts) {
            var options = opts || {};
            var title = String(options.title || '确认操作');

            var hint = String(options.hint || '').trim();
            var fields = Array.isArray(options.fields) ? options.fields : [];
            var zIndex = Number(options.zIndex || 120);
            var confirmText = String(options.confirmText || '确认');
            var cancelText = String(options.cancelText || '取消');
            var confirmClass = String(
                options.confirmClass
                || 'flex-1 py-2 rounded-md bg-[#4C6491] text-white text-sm font-medium hover:bg-[#3D5176]'
            );
            return new Promise(function (resolve) {

                    var firstMsg = '';
                    fields.forEach(function (field) {
                        if (!field || !field.name) { return; }

                        if (field.required && !val) {
                            if (!firstMsg) { firstMsg = '请填写' + String(field.label || field.name); }
                            return;
                        }
                        var minLen = Number(field.minLength || 0);
                        if (minLen > 0 && val.length < minLen) {
                            if (!firstMsg) {
                                firstMsg = String(
                                    field.minLengthMessage
                                    || (String(field.label || '输入') + '至少 ' + minLen + ' 个字')
                                ).trim();
                            }
                        }
                    });
                    if (firstMsg) { return { ok: false, message: firstMsg }; }
                    if (typeof options.validate === 'function') {
                        var vr = options.validate(values);
                        if (!vr || vr.ok === false) {
                            return {
                                ok: false,

                panel.className = 'bg-white rounded-lg shadow-xl w-full max-w-md p-4 sm:p-5';

                lines.forEach(function (line) {

                    row.appendChild(dt);
                    row.appendChild(dd);
                    panel.appendChild(row);

                fields.forEach(function (field) {
                    if (!field || !field.name) { return; }

                    if (field.label) {

                        if (field.required) {

                        ta.className = 'w-full border border-gray-300 rounded-md px-2 py-1.5 text-sm min-h-[4rem]';
                        ta.setAttribute('data-crm-field', field.name);
                        if (field.placeholder) { ta.placeholder = String(field.placeholder); }
                        if (field.value) { ta.value = String(field.value); }

                    } else if (field.type === 'date') {
                        var inp = document.createElement('input');
                        inp.type = 'date';
                        inp.className = 'w-full border border-gray-300 rounded-md px-2 py-1.5 text-sm';
                        inp.setAttribute('data-crm-field', field.name);

                    } else if (field.type === 'select') {
                        var sel = document.createElement('select');
                        sel.className = 'w-full border border-gray-300 rounded-md px-2 py-1.5 text-sm';
                        sel.setAttribute('data-crm-field', field.name);
                        var emptyOpt = document.createElement('option');
                        emptyOpt.value = '';
                        emptyOpt.textContent = String(field.placeholder || '请选择');
                        sel.appendChild(emptyOpt);
                        (Array.isArray(field.options) ? field.options : []).forEach(function (opt) {
                            if (!opt) { return; }
                            var o = document.createElement('option');
                            o.value = String(opt.value == null ? '' : opt.value);
                            o.textContent = String(opt.label == null ? opt.value : opt.label);
                            sel.appendChild(o);

                        if (field.value) { sel.value = String(field.value); }

                if (hint) {

                var actions = document.createElement('div');

                panel.appendChild(errorEl);
                if (options.initialError) {

                var cancelBtn = document.createElement('button');
                cancelBtn.type = 'button';
                cancelBtn.className = 'flex-1 py-2 rounded-md bg-gray-100 text-gray-800 text-sm font-medium hover:bg-gray-200';
                cancelBtn.textContent = cancelText;
                cancelBtn.setAttribute('data-crm-esc-close', '1');
                var confirmBtn = document.createElement('button');
                confirmBtn.type = 'button';

        window.crmIsDeleteConfirmExempt = function (btn) {

        window.crmInferDeleteDialogMeta = function (btn) {

            var target = (btn.getAttribute('data-crm-delete-target') || '').trim();
            var prefix = (btn.getAttribute('data-crm-delete-target-prefix') || '将删除：').trim();
            if (!target) {
                var tr = btn.closest('tr');
                if (tr) {
                    var nameEl = tr.querySelector('[data-crm-delete-name], .crm-name-cell');

                        label = td0 ? (td0.textContent || '').trim() : '';
                    }
                    if (label) { target = prefix + label; }
                }
            }
            if (!target) { target = '确认后将执行删除操作。'; }
            return { title: title, targetText: target, hint: hint };
        };
        (function () {
            var CONFIRMED_ATTR = 'data-crm-delete-confirmed';
            document.addEventListener('click', function (e) {
                var btn = e.target && e.target.closest ? e.target.closest('.crm-op-btn-delete') : null;
                if (!btn) { return; }
                if ((btn.textContent || '').trim() !== '删除') {
                    var aria = (btn.getAttribute('aria-label') || '').trim();
                    if (aria !== '删除' && !btn.getAttribute('data-crm-delete-title')) { return; }
                }
                if (window.crmIsDeleteConfirmExempt(btn)) { return; }
                if (btn.getAttribute(CONFIRMED_ATTR) === '1') {
                    btn.removeAttribute(CONFIRMED_ATTR);
                    return;
                }
                e.preventDefault();
                e.stopPropagation();
                e.stopImmediatePropagation();
                var meta = window.crmInferDeleteDialogMeta(btn);
                window.crmConfirmDeleteDialog(meta).then(function (ok) {

            if (st.display === 'none' || st.visibility === 'hidden' || Number(st.opacity) === 0) { return false; }

        window.crmFindEscCloseButton = function (root) {
            if (!root) { return null; }
            var marked = root.querySelector('[data-crm-esc-close]');
            if (marked) { return marked; }
            var buttons = root.querySelectorAll('button');
            var i, t, b;
            for (i = 0; i < buttons.length; i++) {
                b = buttons[i];
                t = (b.textContent || '').trim();
                if (t === '×' || b.getAttribute('aria-label') === '关闭') { return b; }
            }
            for (i = 0; i < buttons.length; i++) {
                b = buttons[i];
                t = (b.textContent || '').trim();
                if (/^(取消|关闭|关闭日志|结束播放)$/.test(t)) { return b; }
            }
            return null;
        };

        window.crmCloseTopEscModal = function () {
            var candidates = [];
            var pwd = document.getElementById('pwd-change-overlay');
            if (pwd && window.crmEscModalVisible(pwd)) {
                candidates.push({ z: 110, root: pwd });
            }
            var hbPanel = document.getElementById('handbook-assistant-panel');
            if (hbPanel && window.crmEscModalVisible(hbPanel)) {
                candidates.push({
                    z: 150,
                    root: hbPanel,
                    close: function () {
                        var btn = document.getElementById('handbook-assistant-close');
                        if (btn) { btn.click(); }
                    }
                });
            }
            var spcDrawer = document.getElementById('spc-drawer');
            if (spcDrawer && spcDrawer.classList.contains('open')) {
                candidates.push({
                    z: 160,
                    root: spcDrawer,
                    close: function () {
                        var btn = document.getElementById('drawer-close');
                        if (btn) { btn.click(); }
                    }
                });
            }
            var modalSel = '.crm-esc-modal, .delivery-detail-modal-overlay, .roster-detail-modal-overlay, .settlement-detail-modal-overlay';
            document.querySelectorAll(modalSel).forEach(function (el) {
                if (!window.crmEscModalVisible(el)) { return; }
                var z = parseInt(window.getComputedStyle(el).zIndex, 10);
                if (isNaN(z)) { z = 50; }
                candidates.push({ z: z, root: el });
            });
            if (!candidates.length) { return false; }
            candidates.sort(function (a, b) { return b.z - a.z; });
            var top = candidates[0];
            if (top.close) {
                top.close();
                return true;
            }
            var btn = window.crmFindEscCloseButton(top.root);
            if (btn) {
                btn.click();

        };

        window.crmInitHandbookAssistant = function () {
            var shell = document.getElementById('handbook-assistant');

                || window.crmIsSuper
                || window.crmHasPermission('delivery.handbook.read');
            if (!shell || !canUse) {
                if (shell) { shell.classList.add('hidden'); }

            if (shell.dataset.ready === '1') {

            var panel = document.getElementById('handbook-assistant-panel');

            function setPanelOpen(open) {
                if (!panel || !ball) { return; }

                    panel.classList.remove('hidden');

            function scrollMessages() {
                if (messages) { messages.scrollTop = messages.scrollHeight; }

            function sourceLocateText(source) {
                if (!source) { return ''; }
                if (source.media_kind === 'pdf' && source.page) { return 'PDF 第 ' + source.page + ' 页'; }
                if ((source.media_kind === 'video' || source.media_kind === 'audio') && source.seconds !== undefined) {
                    var s = Math.max(0, Number(source.seconds) || 0);
                    var m = Math.floor(s / 60);
                    var r = Math.floor(s % 60);
                    return (source.media_kind === 'video' ? '视频 ' : '音频 ') + m + ':' + String(r).padStart(2, '0');
                }
                if (source.media_kind === 'video') { return '视频'; }
                if (source.media_kind === 'audio') { return '音频'; }
                if (source.media_kind === 'document') { return '文档'; }
                return '来源';
            }

            function escapeHtml(value) {
                return String(value || '').replace(/[&<>"']/g, function (ch) {
                    return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch] || ch;
                });
            }

            function highlightText(value, query, extraTerms) {
                var html = escapeHtml(value || '');
                var terms = [];
                function addTerm(t) {
                    t = String(t || '').trim();
                    if (t && terms.indexOf(t) < 0) { terms.push(t); }
                }
                addTerm(query);
                String(query || '').replace(/[\w.]+|[\u4e00-\u9fff]+/g, function (m) {
                    addTerm(m);
                    return m;
                });
                if (Array.isArray(extraTerms)) {
                    extraTerms.forEach(addTerm);
                }
                terms.sort(function (a, b) { return b.length - a.length; });
                terms.forEach(function (term) {
                    var escaped = escapeHtml(term).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    if (!escaped) { return; }
