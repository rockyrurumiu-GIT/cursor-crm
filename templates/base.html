                overlay.style.pointerEvents = 'none';
                overlay.style.display = 'none';
            }

            function showMainShell() {
                if (!shell) { return; }
                shell.classList.remove('hidden');
                shell.removeAttribute('aria-hidden');
                shell.style.pointerEvents = '';
                shell.style.display = '';
                if (window.crmSyncHeaderHeight) { window.crmSyncHeaderHeight(); }
                window.dispatchEvent(new Event('crm-shell-ready'));
            }

            function isPublicAnonPath() {
                return (window.location.pathname || '').replace(/\/+$/, '') === '/home';
            }

            function showPublicHome() {
                if (shell) { shell.classList.add('bms-anon'); }
                hideLoginOverlay();
                showMainShell();
            }

            function showLogin(msg) {
                shell.classList.add('hidden');
                shell.setAttribute('aria-hidden', 'true');
                shell.style.pointerEvents = 'none';
                shell.style.display = 'none';
                if (overlay) {
                    overlay.classList.remove('hidden');
                    overlay.removeAttribute('aria-hidden');
                    overlay.style.pointerEvents = '';
                    overlay.style.display = '';
                }
                if (pwdOverlay) { pwdOverlay.classList.add('hidden'); }
                window.crmHideHandbookAssistant();
                if (msg) { errEl.textContent = msg; errEl.classList.remove('hidden'); }
                else { errEl.classList.add('hidden'); }
            }

            async function applyMe(data) {
                window.crmAuthMode = data.auth_mode || 'legacy';
                window.crmPermissions = data.permissions || [];
                window.crmIsSuper = (data.roles || []).indexOf('SUPER_ADMIN') >= 0;
                window.crmRecruitmentNavOnly = !!data.recruitment_nav_only;
                window.crmMeUser = data.user || null;
                var u = (data.user && data.user.display_name) || (data.user && data.user.username) || '';
                document.getElementById('header-user').textContent = u || '';
                window.crmApplyNavPermissions();
                window.crmInitNotifications();
                window.crmRefreshNotifications();
            }

            async function verifySession() {
                try {
                    var r = await fetch('/api/me', { credentials: 'same-origin' });
                    if (!r.ok) {
                        localStorage.removeItem('crm_b64');
                        localStorage.removeItem('crm_user');
                        if (isPublicAnonPath()) { showPublicHome(); return; }
                        showLogin(r.status === 401 ? '会话已失效，请重新登录' : '无法验证登录状态');
                        return;
                    }
                    var data = await r.json();
                    await applyMe(data);
                    if (window.crmAuthMode === 'legacy') {
                        await window.crmEnsureLegacySession();
                    }
                    hideLoginOverlay();
                    showMainShell();
                    if (data.must_change_password) {
                        showPwdModal(true);
                        return;
                    }
                    if (window.__crm_login_next) {
                        var dest = window.__crm_login_next;
                        window.__crm_login_next = '';
                        window.location.replace(dest);
                        return;
                    }
                    window.crmInitHandbookAssistant();
                } catch (e) {
                    if (isPublicAnonPath()) { showPublicHome(); return; }
                    showLogin('无法连接服务器');
                }
            }

            async function submitLogin() {
                var u = document.getElementById('login-user').value.trim();
                var p = document.getElementById('login-pwd').value;
                errEl.classList.add('hidden');
                try {
                    var lr = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'same-origin',
                        body: JSON.stringify({ username: u, password: p }),
                    });
                    if (lr.ok) {
                        localStorage.removeItem('crm_b64');
                        localStorage.removeItem('crm_user');
                        await verifySession();
                        return;
                    }
                    var b64 = btoa(u + ':' + p);
                    var r = await fetch('/api/stats', { headers: { 'Authorization': 'Basic ' + b64 } });
                    if (!r.ok) { showLogin('账号或密码错误'); return; }
                    localStorage.setItem('crm_b64', b64);
                    localStorage.setItem('crm_user', u);
                    await window.crmEnsureLegacySession();
                    await verifySession();
                } catch (e) { showLogin('服务器连接失败'); }
            }

            var loginForm = document.getElementById('login-form');
            if (loginForm) {
                loginForm.addEventListener('submit', function (e) {
                    e.preventDefault();
                    submitLogin();
                });
            }

            document.getElementById('logout-btn').onclick = async function () {
                try {
                    await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' });
                } catch (e) { /* ignore */ }
                localStorage.removeItem('crm_b64');
                localStorage.removeItem('crm_user');
                document.getElementById('login-pwd').value = '';
                window.crmHideHandbookAssistant();
                resetPwdModal();
                window.location.href = '/login';
            };

            document.getElementById('change-pwd-btn').onclick = function () {
                showPwdModal();
            };

            (function () {
                var menu = document.getElementById('crm-user-menu');
                var trigger = document.getElementById('crm-user-trigger');
                var dropdown = document.getElementById('crm-user-dropdown');
                if (!menu || !trigger || !dropdown) { return; }
                function setOpen(open) {
                    menu.classList.toggle('is-open', open);
                    dropdown.classList.toggle('hidden', !open);
                    trigger.setAttribute('aria-expanded', open ? 'true' : 'false');
                }
                trigger.addEventListener('click', function (e) {
                    e.stopPropagation();
                    setOpen(dropdown.classList.contains('hidden'));
                });
                document.addEventListener('click', function (e) {
                    if (!menu.contains(e.target)) { setOpen(false); }
                });
                document.addEventListener('keydown', function (e) {
                    if (e.key === 'Escape') { setOpen(false); }
                });
            })();
            document.getElementById('pwd-change-cancel').onclick = closePwdModal;
            document.getElementById('pwd-change-save').onclick = async function () {
                var curEl = document.getElementById('pwd-change-current');
                var nwEl = document.getElementById('pwd-change-new');
                var nw2El = document.getElementById('pwd-change-new2');
                var pwdErr = document.getElementById('pwd-change-err');
                var cur = curEl ? curEl.value : '';
                var nw = nwEl ? nwEl.value : '';
                var nw2 = nw2El ? nw2El.value : '';
                if (pwdErr) { pwdErr.classList.add('hidden'); pwdErr.textContent = ''; }
                if (!nw || nw.length < 6) {
                    if (pwdErr) { pwdErr.textContent = '新密码至少 6 位'; pwdErr.classList.remove('hidden'); }
                    return;
                }
                if (nw !== nw2) {
                    if (pwdErr) { pwdErr.textContent = '两次输入的新密码不一致'; pwdErr.classList.remove('hidden'); }
                    return;
                }
                try {
                    var fetchUrl, fetchOpts;
                    if (_pwdForce) {
                        fetchUrl = '/api/auth/change-password';
                        fetchOpts = {
                            method: 'POST',
                            credentials: 'same-origin',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ current_password: cur, new_password: nw }),
                        };
                    } else {
                        var u = localStorage.getItem('crm_user') || '';
                        var b = localStorage.getItem('crm_b64');
                        if (!b || !u) {
                            closePwdModal();
                            showLogin('请先登录');
                            return;
                        }
                        fetchUrl = '/api/account/change-password';
                        fetchOpts = {
                            method: 'POST',
                            headers: Object.assign({}, window.crmAuthHeader(), { 'Content-Type': 'application/json' }),
                            body: JSON.stringify({ current_password: cur, new_password: nw }),
                        };
                    }
                    var r = await fetch(fetchUrl, fetchOpts);
                    var data = await r.json().catch(function () { return {}; });
                    if (!r.ok) {
                        var detail = data.detail;
                        var msg;
                        if (r.status === 404 && (!detail || detail === 'Not Found')) {
                            msg = '接口不可用（404）：请确认后端已更新并已重启；若在网关后部署请检查是否转发 /api/account/change-password。';
                        } else {
                            msg = typeof detail === 'string' ? detail : (Array.isArray(detail) ? detail.map(function (x) { return x.msg || ''; }).join('；') : '保存失败');
                        }
                        if (pwdErr) { pwdErr.textContent = msg || '保存失败'; pwdErr.classList.remove('hidden'); }
                        return;
                    }
                    if (!_pwdForce) {
                        var u2 = localStorage.getItem('crm_user') || '';
                        var nwVal = nwEl ? nwEl.value : nw;
                        if (u2) { localStorage.setItem('crm_b64', btoa(u2 + ':' + nwVal)); }
                    }
                    _pwdForce = false;
                    var cancelBtn2 = document.getElementById('pwd-change-cancel');
                    var forceNote2 = document.getElementById('pwd-change-force-note');
                    if (cancelBtn2) { cancelBtn2.classList.remove('hidden'); }
                    if (forceNote2) { forceNote2.classList.add('hidden'); }
                    if (pwdOverlay) { pwdOverlay.classList.add('hidden'); }
                    resetPwdModal();
                } catch (e) {
                    if (pwdErr) { pwdErr.textContent = '网络错误'; pwdErr.classList.remove('hidden'); }
                }
            };

            verifySession();
            window.addEventListener('pageshow', function () {
                if (window.crmMeUser) {
                    window.crmInitHandbookAssistant();
                }
            });
        })();
    </script>
    {% block page_scripts %}{% endblock %}
    <script src="/static/js/crm-table-resize.js?v=33"></script>
    <script src="/static/js/crm-cell-clip-pop.js?v=15"></script>
</body>
</html>
